<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Семья - Древо Душиных</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .family-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 5%;
        }

        /* СЕТКА КАРТОЧЕК */
        .family-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        /* КАРТОЧКА ЧЛЕНА СЕМЬИ */
        .member-card {
            background: #fff;
            padding: 20px;
            border-radius: 35px;
            text-align: center;
            border: 2px solid #eee;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ОДИНАКОВЫЙ РАЗМЕР ФОТОГРАФИЙ */
        .member-card img {
            width: 100%;
            height: 380px; /* Фиксированная высота для всех фото */
            object-fit: cover; /* Обрезает лишнее, сохраняя пропорции */
            object-position: center; /* Центрирует изображение */
            border-radius: 25px;
            display: block;
            border: 1px solid #ddd;
        }

        /* ПОДСВЕТКА ФИО */
        .member-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-top: 18px;
            color: #1a1a1a;
            transition: 0.3s;
            font-weight: bold;
            line-height: 1.3;
        }
        
        /* ЭФФЕКТЫ ПРИ НАВЕДЕНИИ */
        .member-card:hover {
            border-color: #3f51b5;
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(63, 81, 181, 0.3);
        }

        .member-card:hover .member-name {
            color: #3f51b5;
        }

        /* ЗАГОЛОВОК СТРАНИЦЫ */
        .family-title {
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            margin-bottom: 50px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="space-bg">

    </div>

            <a href="tree.html">Дерево</a>

    </nav>

    <div class="family-container">
        <h1 class="family-title">Наша Семья</h1>

        <div class="family-grid">
            <a href="aleksandr.html" style="text-decoration: none;">
                <div class="member-card">
                    <img src="aleksandr.jpg" alt="Александр">
                    <div class="member-name">Душин Александр Константинович</div>
                </div>
            </a>

            <a href="david.html" style="text-decoration: none;">

                </div>
            </a>
<a href="konstantin.html" style="text-decoration: none;">
