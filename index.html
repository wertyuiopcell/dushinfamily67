<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Семья Душиных — Главная</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <div class="animated-bg"></div>

    <nav class="navbar">
        <a href="index.html" class="logo">Семья Душиных</a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Главная</a></li>
            <li><a href="books.html">Книги</a></li>
            <li><a href="tree.html">Дерево</a></li>
            <li><a href="family.html">Моя семья</a></li>
        </ul>
    </nav>

    <main class="hero-section">
        <div class="hero-content">
            <h1 class="main-title">История нашей семьи</h1>
            <p class="library-subtitle">Добро пожаловать в цифровой архив рода Душиных. Здесь оживают воспоминания и переплетаются судьбы пяти родов.</p>
            
            <div style="margin-top: 40px;">
                <a href="books.html" class="btn-footer" style="background: #fff; color: #0a0a12; padding: 20px 40px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.2rem; transition: 0.3s; box-shadow: 0 10px 30px rgba(255,255,255,0.1);">
                    Перейти к книгам →
                </a>
            </div>
        </div>
    </main>

    <style>
        .hero-section {
            height: calc(100vh - 100px); 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }
        .hero-content {
            max-width: 900px;
            animation: fadeIn 2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</body>
